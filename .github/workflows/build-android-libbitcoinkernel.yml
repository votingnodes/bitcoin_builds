name: Build Android arm64 libbitcoinkernel.so

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Clone Bitcoin Core
      run: git clone https://github.com/bitcoin/bitcoin.git
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip cmake make
    - name: Download Android NDK
      run: |
        export ANDROID_NDK_URL=https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
        export ANDROID_NDK_HOME=$PWD/android-ndk
        mkdir -p $ANDROID_NDK_HOME
        curl -L $ANDROID_NDK_URL -o android-ndk.zip
        unzip android-ndk.zip -d $ANDROID_NDK_HOME
        ANDROID_NDK_HOME=$ANDROID_NDK_HOME/android-ndk-r23c
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
    - name: Download and build Boost
      run: |
        export BOOST_VERSION=1.83.0
        curl -L https://github.com/boostorg/boost/releases/download/boost-${BOOST_VERSION}/boost-${BOOST_VERSION}.tar.gz -o boost.tar.gz
        tar -xzf boost.tar.gz
        cd boost-${BOOST_VERSION}
        cmake -B build-boost \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_API=28 \
          -DBUILD_SHARED_LIBS=OFF \
          -DBOOST_ENABLE_CMAKE=ON \
          -DCMAKE_INSTALL_PREFIX=$PWD/../boost-install
        cmake --build build-boost --target install -j$(nproc)
    - name: Configure and build
      run: |
        cd bitcoin
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_API=28 \
          -DCMAKE_PREFIX_PATH=$PWD/../boost-install \
          -DBoost_DIR=$PWD/../boost-install/lib/cmake/Boost-1.83.0 \
          -Dboost_headers_DIR=$PWD/../boost-install/lib/cmake/Boost-1.83.0 \
          -DBUILD_KERNEL_LIB=ON \
          -DENABLE_WALLET=OFF \
          -DENABLE_IPC=OFF \
          -DBUILD_GUI=OFF \
          -DBUILD_TESTS=OFF
        cmake --build build --target libbitcoinkernel -j$(nproc)
    - name: Strip library
      run: |
        cd bitcoin
        $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip build/src/libbitcoinkernel.so
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libbitcoinkernel.so
        path: bitcoin/build/src/libbitcoinkernel.so
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: libbitcoinkernel.so
    - name: Create metadata.json
      run: |
        echo '{"version": "'$GITHUB_SHA'", "arch": "arm64", "platform": "android"}' > metadata.json
    - name: Release
      run: |
        TAG=$GITHUB_SHA
        gh release create $TAG --generate-notes --title "Build $TAG" --prerelease libbitcoinkernel.so metadata.json
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}