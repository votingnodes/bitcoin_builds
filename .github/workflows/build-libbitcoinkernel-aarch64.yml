name: Build libbitcoinkernel for aarch64

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libevent-dev libsqlite3-dev libzmq3-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download Boost source
        run: |
          cd /tmp
          wget -q https://archives.boost.io/release/1.87.0/source/boost_1_87_0.tar.gz
          tar -xzf boost_1_87_0.tar.gz
          cd boost_1_87_0
          ./bootstrap.sh --with-toolset=gcc --with-libraries=system,filesystem,program_options,test

      - name: Build Boost for ARM64
        run: |
          cd /tmp/boost_1_87_0
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export RANLIB=aarch64-linux-gnu-ranlib
          ./b2 variant=release link=static runtime-link=shared address-model=64 -j$(nproc) --prefix=/tmp/boost-aarch64 install

      - name: Patch AddBoostIfNeeded for module mode
        run: |
          cd bitcoin-core
          sed -i 's/find_package(Boost 1.74.0 REQUIRED CONFIG)/find_package(Boost 1.74.0 REQUIRED)/' cmake/module/AddBoostIfNeeded.cmake

      - name: Create toolchain file
        run: |
          cat > bitcoin-core/aarch64-linux-gnu.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_CXX_FLAGS_INIT "-march=armv8-a")
          set(CMAKE_C_FLAGS_INIT "-march=armv8-a")
          set(BOOST_ROOT /tmp/boost-aarch64)
          set(BOOST_INCLUDEDIR /tmp/boost-aarch64/include)
          set(CMAKE_FIND_ROOT_PATH /tmp/boost-aarch64)
          EOF

      - name: Configure
        run: |
          cd bitcoin-core
          cmake -B build -DBUILD_KERNEL_LIB=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_TOOLCHAIN_FILE=aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_WALLET=OFF \
            -DENABLE_IPC=OFF \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF

      - name: Build
        run: |
          cd bitcoin-core
          cmake --build build -j$(nproc) --target bitcoinkernel

      - name: Check build output
        run: |
          cd bitcoin-core
          ls -la build/src/kernel/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbitcoinkernel-aarch64
          path: |
            bitcoin-core/build/src/kernel/libbitcoinkernel.so*
            bitcoin-core/aarch64-linux-gnu.cmake

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: libbitcoinkernel-aarch64
          path: artifacts

      - name: Create metadata JSON
        run: |
          cd artifacts
          FILE=$(ls libbitcoinkernel.so* | head -1)
          if [ -z "$FILE" ]; then
            echo "No libbitcoinkernel.so* file found"
            exit 1
          fi
          FILE_INFO=$(file "$FILE" | sed 's/"/\\"/g')
          cat > metadata.json << EOF
          {
            "library": "libbitcoinkernel",
            "architecture": "aarch64",
            "file": "$FILE",
            "size": $(stat -c%s "$FILE"),
            "sha256": "$(sha256sum "$FILE" | cut -d' ' -f1)",
            "arch": "$FILE_INFO",
            "boost_version": "1.87.0",
            "bitcoin_commit": "${{ github.sha }}",
            "build_type": "RelWithDebInfo"
          }
          EOF
          cat metadata.json

      - name: Create GitHub Release
        run: |
          TAG="commit-${{ github.sha }}"
          BODY="Auto-generated release from commit ${{ github.sha }}"
          curl -s -X POST https://api.github.com/repos/${{ github.repository }}/releases \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"$TAG\", \"body\": \"$BODY\", \"draft\": false, \"prerelease\": false}" > release.json
          cat release.json

      - name: List artifacts
        run: |
          cd artifacts
          ls -la

      - name: Upload assets to release
        run: |
          cd artifacts
          TAG="commit-${{ github.sha }}"
          RELEASE_ID=$(cat ../release.json | grep -o '"id": [0-9]*' | head -1 | cut -d' ' -f2)
          echo "Uploading to release $RELEASE_ID"
          for file in *.so metadata.json; do
            [ -f "$file" ] || continue
            echo "Uploading $file"
            curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$(basename $file)" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              -T "$file"
          done