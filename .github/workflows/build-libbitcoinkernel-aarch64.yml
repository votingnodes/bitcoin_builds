name: Build libbitcoinkernel for aarch64

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libevent-dev libsqlite3-dev libzmq3-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download Boost source
        run: |
          cd /tmp
          wget -q https://archives.boost.io/release/1.87.0/source/boost_1_87_0.tar.gz
          tar -xzf boost_1_87_0.tar.gz
          cd boost_1_87_0
          ./bootstrap.sh --with-toolset=gcc --with-libraries=system,filesystem,program_options,test

      - name: Build Boost for ARM64
        run: |
          cd /tmp/boost_1_87_0
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export RANLIB=aarch64-linux-gnu-ranlib
          ./b2 variant=release link=static runtime-link=shared address-model=64 -j$(nproc) --prefix=/tmp/boost-aarch64 install

      - name: Debug Boost installation
        run: |
          ls -la /tmp/boost-aarch64/
          find /tmp/boost-aarch64 -name "*.hpp" | head -5
          find /tmp/boost-aarch64 -name "*.so*" | head -5

      - name: Patch AddBoostIfNeeded for module mode
        run: |
          cd bitcoin-core
          sed -i 's/find_package(Boost 1.74.0 REQUIRED CONFIG)/find_package(Boost 1.74.0 REQUIRED)/' cmake/module/AddBoostIfNeeded.cmake

      - name: Create toolchain file
        run: |
          cat > bitcoin-core/aarch64-linux-gnu.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_CXX_FLAGS_INIT "-march=armv8-a")
          set(CMAKE_C_FLAGS_INIT "-march=armv8-a")
          set(BOOST_ROOT /tmp/boost-aarch64)
          set(BOOST_INCLUDEDIR /tmp/boost-aarch64/include)
          set(CMAKE_FIND_ROOT_PATH /tmp/boost-aarch64)
          EOF

      - name: Configure
        run: |
          cd bitcoin-core
          cmake -B build -DBUILD_KERNEL_LIB=ON \
            -DCMAKE_TOOLCHAIN_FILE=aarch64-linux-gnu.cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_WALLET=OFF \
            -DENABLE_IPC=OFF \
            -DBUILD_GUI=OFF \
            -DBUILD_TESTS=OFF

      - name: Build
        run: |
          cd bitcoin-core
          cmake --build build -j$(nproc) --target libbitcoinkernel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbitcoinkernel-aarch64
          path: |
            bitcoin-core/build/src/*.so*
            bitcoin-core/aarch64-linux-gnu.cmake